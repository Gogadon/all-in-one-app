<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C0D0E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="All-in-One">
<title>All-in-One</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Hierhin rendert die App (Tab-Inhalte) -->
  <main id="main"></main>

  <!-- Untere Tab-Navi — wird von app.js befüllt (Schritt 3) -->
  <nav id="nav" class="nav"></nav>

  <script type="module" src="js/app.js"></script>

  <!-- Service Worker: nur damit die App installierbar ist. Cacht nichts,
       deshalb sind Updates nach einem Deploy sofort sichtbar. -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {
          /* ohne SW läuft die App trotzdem, nur ggf. nicht installierbar */
        });
      });
    }
  </script>
</body>
</html>
